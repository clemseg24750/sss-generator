<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSS | Release Video Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;
  --border:rgba(255,255,255,0.08);--border-h:rgba(255,255,255,0.18);
  --text:#f0f0f0;--muted:#666;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
@font-face{font-family:'AkzidenzGroteskBE-LightEx';src:url('fonts/AkzidenzGroteskBE-LightEx.otf') format('opentype');font-weight:normal;font-style:normal}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px}
header{border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:14px}
header .logo{height:28px;width:auto;display:block;opacity:0.85;filter:invert(1)}
header .sep{width:1px;height:14px;background:var(--border-h)}
header h1{font-size:13px;font-weight:400;color:var(--muted);letter-spacing:.04em}
.app{display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 53px)}
.sidebar{border-right:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.main{padding:24px;display:flex;flex-direction:column;align-items:center;gap:16px}
.field-group{display:flex;flex-direction:column;gap:5px}
label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
input[type=text]{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--sans);font-size:14px;padding:8px 11px;width:100%;outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:var(--border-h)}
input[type=text]::placeholder{color:var(--muted)}
.upload-zone{position:relative;background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:13px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:11px;overflow:hidden}
.upload-zone:hover{border-color:var(--border-h);background:var(--surface2)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uz-icon{width:34px;height:34px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.uz-title{font-size:13px;color:var(--text);font-weight:500}
.uz-sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.thumb{width:34px;height:34px;object-fit:cover;border-radius:4px;display:none;flex-shrink:0}
.divider{height:1px;background:var(--border)}
.sec-title{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:-4px}
input[type=range]{-webkit-appearance:none;flex:1;height:3px;background:var(--border-h);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#fff;cursor:pointer}
input[type=color]{-webkit-appearance:none;width:100%;height:32px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;padding:2px;outline:none;transition:border-color .15s}
input[type=color]:hover{border-color:var(--border-h)}
input[type=color]::-webkit-color-swatch-wrapper{padding:0;border-radius:4px}
input[type=color]::-webkit-color-swatch{border:none;border-radius:4px}
.range-row{display:flex;align-items:center;gap:10px}
.range-val{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:28px;text-align:right}
.range-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:12px;text-align:center;flex-shrink:0}
.btn{border:1px solid var(--border-h);border-radius:6px;background:transparent;color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 16px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn.primary{background:#fff;color:#000;border-color:#fff;font-weight:500}
.btn.primary:hover{background:#ddd;border-color:#ddd}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none}
.btn-row{display:flex;gap:8px;width:100%;max-width:440px}
.canvas-wrap{background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--border);width:100%;max-width:440px;aspect-ratio:4/5}
canvas{display:block;width:100%;height:100%}
.progress-bar{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-top:6px;width:100%;max-width:440px}
.progress-fill{height:100%;width:0%;background:#fff;border-radius:1px;transition:width .1s linear}
.status{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;min-height:16px;letter-spacing:.04em;max-width:440px;line-height:1.6}
.status.error{color:#f87171}.status.success{color:#4ade80}
.audio-ok{display:none;align-items:center;gap:6px;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-top:6px}
.audio-ok .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.audio-ok span{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notice{padding:10px 12px;background:#0a120a;border:1px solid #1a3a1a;border-radius:7px;font-family:var(--mono);font-size:10px;color:#4a8a4a;line-height:1.8}
.color-pick.active{background:#fff;color:#000;border-color:#fff;font-weight:500}
</style>
</head>
<body>
<header>
  <img class="logo" src="https://res.cloudinary.com/shotgun/image/upload/c_limit,w_1200,h_630/f_jpg/q_auto/production/artworks/SSS_LOGO_NOTEXT-X1.5-B_W_rfprc1.png" alt="SSS">
  <div class="sep"></div>
  <h1>Post Generator</h1>
</header>
<div class="app">
  <aside class="sidebar">
    <div class="sec-title">Visuels</div>
    <div class="field-group">
      <label>Background / Texture</label>
      <div class="upload-zone">
        <div class="uz-icon">🖼</div><img class="thumb" id="bg-thumb">
        <div><div class="uz-title" id="bg-name">Choisir une image</div><div class="uz-sub">JPG PNG WEBP</div></div>
        <input type="file" accept="image/*" id="bg-file">
      </div>
    </div>
    <div class="field-group">
      <label>BG — Position horizontale</label>
      <div class="range-row">
        <span class="range-lbl">G</span>
        <input type="range" id="bg-pos-x" min="0" max="100" step="1" value="50">
        <span class="range-lbl">D</span>
      </div>
    </div>
    <div class="field-group">
      <label>BG — Position verticale</label>
      <div class="range-row">
        <span class="range-lbl">H</span>
        <input type="range" id="bg-pos-y" min="0" max="100" step="1" value="50">
        <span class="range-lbl">B</span>
      </div>
    </div>
    <div class="field-group">
      <label>BG — Zoom</label>
      <div class="range-row">
        <input type="range" id="bg-zoom" min="100" max="200" step="1" value="100">
        <span class="range-val" id="bg-zoom-val">100%</span>
      </div>
    </div>
    <div class="field-group">
      <label>Cover de la release</label>
      <div class="upload-zone">
        <div class="uz-icon">💿</div><img class="thumb" id="cover-thumb">
        <div><div class="uz-title" id="cover-name">Choisir une image</div><div class="uz-sub">JPG PNG WEBP</div></div>
        <input type="file" accept="image/*" id="cover-file">
      </div>
    </div>
    <div class="divider"></div>
    <div class="sec-title">Metadata</div>
    <div class="field-group"><label>Artiste</label><input type="text" id="f-artist" placeholder="Nom de l'artiste"></div>
    <div class="field-group"><label>Titre du morceau</label><input type="text" id="f-title" placeholder="Titre"></div>
    <div class="field-group"><label>Label</label><input type="text" id="f-label" placeholder="Nom du label"></div>
    <div class="divider"></div>
    <div class="sec-title">Textes</div>
    <div class="field-group">
      <label>Couleur des textes</label>
      <div class="btn-row" style="max-width:none">
        <button class="btn color-pick active" id="pick-white" onclick="setTextColor('white')" style="flex:1;justify-content:center">Blanc</button>
        <button class="btn color-pick" id="pick-black" onclick="setTextColor('black')" style="flex:1;justify-content:center">Noir</button>
      </div>
    </div>
    <div class="field-group">
      <label>Opacité — Artiste</label>
      <div class="range-row">
        <input type="range" id="op-artist" min="0" max="100" step="1" value="96">
        <span class="range-val" id="op-artist-val">96%</span>
      </div>
    </div>
    <div class="field-group">
      <label>Opacité — Titre</label>
      <div class="range-row">
        <input type="range" id="op-title" min="0" max="100" step="1" value="60">
        <span class="range-val" id="op-title-val">60%</span>
      </div>
    </div>
    <div class="field-group">
      <label>Opacité — Label</label>
      <div class="range-row">
        <input type="range" id="op-label" min="0" max="100" step="1" value="28">
        <span class="range-val" id="op-label-val">28%</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="sec-title">Audio</div>
    <div class="field-group">
      <label>Extrait audio (boucle 30s max)</label>
      <div class="upload-zone">
        <div class="uz-icon">🎵</div>
        <div><div class="uz-title" id="audio-name">Choisir un fichier</div><div class="uz-sub">MP3 WAV AAC</div></div>
        <input type="file" accept="audio/*" id="audio-file">
      </div>
      <div class="audio-ok" id="audio-ok"><div class="dot"></div><span id="audio-fname">—</span></div>
    </div>
    <div class="field-group" id="loop-field" style="display:none">
      <label>Début de la boucle</label>
      <div class="range-row">
        <input type="range" id="loop-start" min="0" max="300" step="1" value="0">
        <span class="range-val" id="loop-val">0s</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="sec-title">Export</div>
    <div class="field-group">
      <label>Durée de la vidéo</label>
      <div class="range-row">
        <input type="range" id="dur-range" min="5" max="30" step="1" value="15">
        <span class="range-val" id="dur-val">15s</span>
      </div>
    </div>
    <div class="notice">⚡ FFmpeg (~20 MB) se charge à la première génération.<br>📁 MP4 H.264 · 1080×1350 · Instagram ready.</div>
  </aside>
  <main class="main">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="progress-bar"><div class="progress-fill" id="rec-prog"></div></div>
    <div class="btn-row">
      <button class="btn" onclick="refreshPreview()">↺ Aperçu</button>
      <button class="btn primary" id="rec-btn" onclick="startExport()">⬇ Générer MP4</button>
    </div>
    <p class="status" id="status"></p>
  </main>
</div>

<!-- FFmpeg 0.11.x : pas de Worker externe, 100% inline -->
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

<script>
const W=1080,H=1350;
const cv=document.getElementById('cv');
cv.width=W;cv.height=H;
const ctx=cv.getContext('2d');

let bgImg=null,coverImg=null,audioBuffer=null,audioCtx=null;
let previewRaf=null,previewT=0,previewLast=null;
let ffmpegReady=false,ff=null;

// Cached DOM elements
const elBgZoomVal=document.getElementById('bg-zoom-val');
const elLoopVal=document.getElementById('loop-val');
const elDurVal=document.getElementById('dur-val');
const elOpArtistVal=document.getElementById('op-artist-val');
const elOpTitleVal=document.getElementById('op-title-val');
const elOpLabelVal=document.getElementById('op-label-val');
const elStatus=document.getElementById('status');
const elRecBtn=document.getElementById('rec-btn');
const elRecProg=document.getElementById('rec-prog');
const elLoopField=document.getElementById('loop-field');
const elAudioOk=document.getElementById('audio-ok');
const elAudioFname=document.getElementById('audio-fname');
const elBgThumb=document.getElementById('bg-thumb');
const elCoverThumb=document.getElementById('cover-thumb');
const elBgName=document.getElementById('bg-name');
const elCoverName=document.getElementById('cover-name');
const elAudioName=document.getElementById('audio-name');

// Render state — updated on input events, read in drawFrame (no DOM reads per frame)
const state={
  bgZoom:100,bgPosX:50,bgPosY:50,
  artist:'',title:'',label:'',
  rgb:'255,255,255',
  opA:0.96,opT:0.60,opL:0.28,
  dur:15,loopStart:0
};

const AGLightEx=new FontFace('AkzidenzGroteskBE-LightEx','url(fonts/AkzidenzGroteskBE-LightEx.otf)');
AGLightEx.load().then(f=>{document.fonts.add(f);refreshPreview();});

function shortName(s,n=24){return s.length>n?s.slice(0,n-1)+'…':s;}
function loadImg(file,cb){const r=new FileReader();r.onload=e=>{const i=new Image();i.onload=()=>cb(i);i.src=e.target.result;};r.readAsDataURL(file);}
function setStatus(msg,type=''){elStatus.textContent=msg;elStatus.className='status'+(type?' '+type:'');}
function hexToRgb(hex){return`${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;}

document.getElementById('bg-file').onchange=e=>{
  if(!e.target.files[0])return;
  loadImg(e.target.files[0],img=>{bgImg=img;});
  if(elBgThumb.src.startsWith('blob:'))URL.revokeObjectURL(elBgThumb.src);
  elBgThumb.src=URL.createObjectURL(e.target.files[0]);elBgThumb.style.display='block';
  elBgName.textContent=shortName(e.target.files[0].name);
};
document.getElementById('cover-file').onchange=e=>{
  if(!e.target.files[0])return;
  loadImg(e.target.files[0],img=>{coverImg=img;});
  if(elCoverThumb.src.startsWith('blob:'))URL.revokeObjectURL(elCoverThumb.src);
  elCoverThumb.src=URL.createObjectURL(e.target.files[0]);elCoverThumb.style.display='block';
  elCoverName.textContent=shortName(e.target.files[0].name);
};
document.getElementById('audio-file').onchange=async e=>{
  if(!e.target.files[0])return;
  const f=e.target.files[0];
  audioCtx=audioCtx||new AudioContext();
  try{
    audioBuffer=await audioCtx.decodeAudioData(await f.arrayBuffer());
    const max=Math.max(0,Math.floor(audioBuffer.duration)-30);
    document.getElementById('loop-start').max=max;
    elLoopField.style.cssText='display:flex;flex-direction:column;gap:5px';
    elAudioOk.style.display='flex';
    elAudioFname.textContent=shortName(f.name,32);
    elAudioName.textContent=shortName(f.name);
  }catch(err){setStatus('Fichier audio non supporté.','error');}
};

document.getElementById('bg-zoom').oninput=e=>{state.bgZoom=+e.target.value;elBgZoomVal.textContent=e.target.value+'%';};
document.getElementById('bg-pos-x').oninput=e=>{state.bgPosX=+e.target.value;};
document.getElementById('bg-pos-y').oninput=e=>{state.bgPosY=+e.target.value;};
document.getElementById('loop-start').oninput=e=>{state.loopStart=+e.target.value;elLoopVal.textContent=e.target.value+'s';};
document.getElementById('dur-range').oninput=e=>{state.dur=+e.target.value;elDurVal.textContent=e.target.value+'s';};
document.getElementById('op-artist').oninput=e=>{state.opA=+e.target.value/100;elOpArtistVal.textContent=e.target.value+'%';};
document.getElementById('op-title').oninput=e=>{state.opT=+e.target.value/100;elOpTitleVal.textContent=e.target.value+'%';};
document.getElementById('op-label').oninput=e=>{state.opL=+e.target.value/100;elOpLabelVal.textContent=e.target.value+'%';};
function setTextColor(c){
  state.rgb=c==='black'?'0,0,0':'255,255,255';
  document.getElementById('pick-white').classList.toggle('active',c==='white');
  document.getElementById('pick-black').classList.toggle('active',c==='black');
}
document.getElementById('f-artist').oninput=e=>{state.artist=e.target.value;};
document.getElementById('f-title').oninput=e=>{state.title=e.target.value;};
document.getElementById('f-label').oninput=e=>{state.label=e.target.value;};

function drawFrame(t,totalDur){
  ctx.clearRect(0,0,W,H);
  if(bgImg){
    const zoom=state.bgZoom/100;
    const posX=state.bgPosX/100,posY=state.bgPosY/100;
    const anim=1.03+0.015*Math.sin(t*0.25);
    const coverScale=Math.max(W/bgImg.naturalWidth,H/bgImg.naturalHeight);
    const finalScale=coverScale*zoom*anim;
    const sw=bgImg.naturalWidth*finalScale,sh=bgImg.naturalHeight*finalScale;
    ctx.drawImage(bgImg,(W-sw)*posX,(H-sh)*posY,sw,sh);
  }else{
    ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
    ctx.beginPath();
    for(let y=0;y<H;y+=60){ctx.moveTo(0,y);ctx.lineTo(W,y);}
    for(let x=0;x<W;x+=60){ctx.moveTo(x,0);ctx.lineTo(x,H);}
    ctx.stroke();
  }
  ctx.fillStyle='rgba(0,0,0,0.52)';ctx.fillRect(0,0,W,H);
  const artist=state.artist||'Artist';
  const title=state.title||'Track Title';
  const label=state.label||'Label';
  const cs=640,cx=(W-cs)/2,cy=200;
  if(coverImg){
    ctx.save();ctx.beginPath();ctx.roundRect(cx,cy,cs,cs,16);ctx.clip();
    ctx.drawImage(coverImg,cx,cy,cs,cs);ctx.restore();
    ctx.strokeStyle='rgba(255,255,255,0.10)';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(cx,cy,cs,cs,16);ctx.stroke();
  }else{
    ctx.fillStyle='#1c1c1c';ctx.beginPath();ctx.roundRect(cx,cy,cs,cs,16);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.18)';ctx.font='500 32px DM Sans,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Cover',W/2,cy+cs/2);
  }
  const {rgb,opA,opT,opL}=state;
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.font='72px AkzidenzGroteskBE-LightEx,sans-serif';ctx.fillStyle=`rgba(${rgb},${opA})`;ctx.fillText(artist,W/2,cy+cs+110);
  ctx.font='46px AkzidenzGroteskBE-LightEx,sans-serif';ctx.fillStyle=`rgba(${rgb},${opT})`;ctx.fillText(title,W/2,cy+cs+175);
  ctx.font='26px AkzidenzGroteskBE-LightEx,sans-serif';ctx.fillStyle=`rgba(${rgb},${opL})`;ctx.fillText(label.toUpperCase(),W/2,cy+cs+230);
  const barW=320,barH=3,barX=(W-barW)/2,barY=cy+cs+290;
  ctx.fillStyle='rgba(255,255,255,0.10)';ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,2);ctx.fill();
  const prog=totalDur>0?(t%totalDur)/totalDur:0;
  ctx.fillStyle='rgba(255,255,255,0.75)';ctx.beginPath();ctx.roundRect(barX,barY,barW*prog,barH,2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(barX+barW*prog,barY+barH/2,8,0,Math.PI*2);ctx.fill();
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  ctx.font='400 22px DM Mono,monospace';ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.textAlign='left';ctx.fillText(fmt(Math.floor(t%totalDur)),barX,barY+36);
  ctx.textAlign='right';ctx.fillText(fmt(Math.floor(totalDur)),barX+barW,barY+36);
}

function refreshPreview(){
  if(previewRaf){cancelAnimationFrame(previewRaf);previewRaf=null;}
  previewT=0;previewLast=null;
  function loop(ts){
    if(previewLast===null)previewLast=ts;
    previewT+=(ts-previewLast)/1000;previewLast=ts;
    drawFrame(previewT,state.dur);previewRaf=requestAnimationFrame(loop);
  }
  previewRaf=requestAnimationFrame(loop);
}
refreshPreview();

function audioBufferToWav(buffer){
  const nc=buffer.numberOfChannels,sr=buffer.sampleRate,ns=buffer.length,bd=16;
  const byteRate=sr*nc*bd/8,ba=nc*bd/8,dataSize=ns*ba;
  const ab=new ArrayBuffer(44+dataSize),view=new DataView(ab);
  const w=(o,s)=>{for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));};
  w(0,'RIFF');view.setUint32(4,36+dataSize,true);w(8,'WAVE');w(12,'fmt ');
  view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,nc,true);
  view.setUint32(24,sr,true);view.setUint32(28,byteRate,true);view.setUint16(32,ba,true);
  view.setUint16(34,bd,true);w(36,'data');view.setUint32(40,dataSize,true);
  let off=44;
  for(let i=0;i<ns;i++)for(let ch=0;ch<nc;ch++){
    const s=Math.max(-1,Math.min(1,buffer.getChannelData(ch)[i]));
    view.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2;
  }
  return new Blob([ab],{type:'audio/wav'});
}

async function initFFmpeg(){
  if(ffmpegReady)return;
  setStatus('Chargement de FFmpeg (~20 MB)…');
  const {createFFmpeg}=FFmpeg;
  ff=createFFmpeg({
    corePath:'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
    log:false,
    progress:({ratio})=>{
      const pct=Math.round(ratio*100);
      elRecProg.style.width=(50+pct*0.48)+'%';
      setStatus(`Encodage MP4… ${pct}%`);
    }
  });
  await ff.load();
  ffmpegReady=true;
}

async function startExport(){
  const {dur}=state;
  const fps=30,totalFrames=dur*fps;
  elRecBtn.disabled=true;
  if(previewRaf){cancelAnimationFrame(previewRaf);previewRaf=null;}

  try{await initFFmpeg();}
  catch(e){setStatus('Erreur FFmpeg : '+e.message,'error');elRecBtn.disabled=false;refreshPreview();return;}

  setStatus('Rendu des frames…');
  for(let i=0;i<totalFrames;i++){
    drawFrame(i/fps,dur);
    const blob=await new Promise(res=>cv.toBlob(res,'image/jpeg',0.92));
    ff.FS('writeFile',`f${String(i).padStart(5,'0')}.jpg`,new Uint8Array(await blob.arrayBuffer()));
    if(i%fps===0){
      elRecProg.style.width=(i/totalFrames*45)+'%';
      setStatus(`Rendu des frames… ${Math.round(i/totalFrames*100)}%`);
      await new Promise(r=>setTimeout(r,0));
    }
  }
  elRecProg.style.width='48%';

  if(audioBuffer){
    setStatus('Encodage audio…');
    const ls=state.loopStart;
    const ld=Math.min(dur,audioBuffer.duration-ls);
    const sr=audioBuffer.sampleRate,ns=Math.ceil(ld*sr);
    const offCtx=new OfflineAudioContext(2,ns,sr);
    const src=offCtx.createBufferSource();
    src.buffer=audioBuffer;src.connect(offCtx.destination);src.start(0,ls);
    const rendered=await offCtx.startRendering();
    ff.FS('writeFile','audio.wav',new Uint8Array(await audioBufferToWav(rendered).arrayBuffer()));
  }

  setStatus('Encodage H.264…');
  elRecProg.style.width='50%';

  try{
    await ff.run(
      '-framerate',String(fps),
      '-i','f%05d.jpg',
      ...(audioBuffer?['-i','audio.wav','-shortest']:[]),
      '-vf',`scale=${W}:${H}`,
      '-c:v','libx264',
      '-preset','fast',
      '-crf','20',
      ...(audioBuffer?['-c:a','aac','-b:a','192k']:[]),
      '-movflags','+faststart',
      'out.mp4'
    );
  }catch(e){setStatus('Erreur encodage : '+e.message,'error');elRecBtn.disabled=false;refreshPreview();return;}

  const data=ff.FS('readFile','out.mp4');
  const url=URL.createObjectURL(new Blob([data.buffer],{type:'video/mp4'}));
  const a=document.createElement('a');
  const artist=(state.artist||'release').replace(/\s+/g,'_');
  const title=(state.title||'video').replace(/\s+/g,'_');
  a.download=`${artist}-${title}.mp4`;a.href=url;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),5000);

  elRecProg.style.width='100%';
  setStatus('✓ MP4 téléchargé — prêt pour Instagram.','success');
  elRecBtn.disabled=false;

  for(let i=0;i<totalFrames;i++)try{ff.FS('unlink',`f${String(i).padStart(5,'0')}.jpg`);}catch(e){}
  try{ff.FS('unlink','out.mp4');}catch(e){}
  if(audioBuffer)try{ff.FS('unlink','audio.wav');}catch(e){}
  setTimeout(()=>{elRecProg.style.width='0%';},3000);
  refreshPreview();
}
</script>
